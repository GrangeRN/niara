<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brightspace Quiz CSV Converter - GrangeRN</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- File processing libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;

        function BrightspaceConverter() {
          const [input, setInput] = useState('');
          const [csvOutput, setCsvOutput] = useState('');
          const [errors, setErrors] = useState([]);
          const [success, setSuccess] = useState(false);
          const [courseCode, setCourseCode] = useState('');
          const [fileInputKey, setFileInputKey] = useState(Date.now());
          const [assessmentType, setAssessmentType] = useState('Quiz');
          const [assessmentNumber, setAssessmentNumber] = useState('');

          const handleStartOver = () => {
            setInput('');
            setCsvOutput('');
            setErrors([]);
            setSuccess(false);
            setFileInputKey(Date.now());
          };

          const generateTitlePrefix = () => {
            if (!assessmentNumber) return '';
            const prefix = assessmentType === 'Quiz' ? 'Q' : 'E';
            return `${prefix}${assessmentNumber}`;
          };

          const handleFileUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            setErrors([]);
            setSuccess(false);

            try {
              if (file.type === 'application/pdf') {
                setErrors(['PDF files need to be copied and pasted. Please open your PDF, select all text (Ctrl+A), copy (Ctrl+C), and paste it in the text area below.']);
                return;
              } else if (file.name.endsWith('.docx') || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                const arrayBuffer = await file.arrayBuffer();
                const result = await window.mammoth.extractRawText({ arrayBuffer });
                setInput(result.value);
              } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls') || 
                         file.type === 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' ||
                         file.type === 'application/vnd.ms-excel') {
                const arrayBuffer = await file.arrayBuffer();
                const workbook = window.XLSX.read(arrayBuffer);
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const text = window.XLSX.utils.sheet_to_csv(firstSheet);
                setInput(text);
              } else {
                const text = await file.text();
                setInput(text);
              }
            } catch (err) {
              setErrors([`Error reading file: ${err.message}. Please try a different format or paste the text directly.`]);
            }
          };

          const identifyQuestionType = (text) => {
            const lower = text.toLowerCase();
            
            if (lower.includes('true or false') || lower.includes('t/f') || lower.includes('true/false')) {
              return 'TF';
            }
            if (lower.includes('select all that apply') || lower.includes('check all') || lower.includes('choose all') || lower.includes('drag and drop all that apply')) {
              return 'MS';
            }
            if ((lower.includes('match') && (lower.includes('with') || lower.includes('each'))) || 
                lower.includes('column a') || 
                lower.includes('column b') ||
                /stem\s*\(matching\)/i.test(text)) {
              return 'MATCHING';
            }
            if (text.includes('____') || 
                text.includes('___') ||
                /\bat\s+____\s+/.test(text) ||
                /will\s+(be|regulate|calculate|infuse|administer).*at\s+____/.test(lower) ||
                /(calculate|round|fill in|complete|blank)/i.test(text)) {
              return 'FILL_IN_BLANK';
            }
            
            return 'MC';
          };

          const generateTitle = (questionText) => {
            const words = questionText.split(' ').filter(w => w.length > 3 && !['what', 'which', 'when', 'where', 'how', 'does', 'should', 'would', 'could'].includes(w.toLowerCase()));
            return words.slice(0, 4).join(' ').replace(/[?.,]/g, '');
          };

          const parseQuestions = (text) => {
            const lines = text.split('\n');
            const processedLines = [];
            
            for (let line of lines) {
              line = line.replace(/^Prompts\s*\/?\s*Possible Answers\s*/i, '');
              
              if (/[a-e][\.\)]\s+.+?\s+[a-e][\.\)]\s+/i.test(line)) {
                const parts = line.split(/(?=[a-e][\.\)]\s)/i);
                processedLines.push(...parts.filter(p => p.trim()));
              } else {
                processedLines.push(line);
              }
            }
            
            const questions = [];
            let currentQuestion = null;
            let questionCounter = 1;
            let inRationale = false;
            const idPrefix = courseCode || 'Q';

            for (let i = 0; i < processedLines.length; i++) {
              const line = processedLines[i].trim();
              
              if (!line && !inRationale) continue;

              if (!currentQuestion && line && !line.startsWith('Title:') && !line.startsWith('Question ID:') && !/^\d+\.\s*$/.test(line) && !/^Question\s+\d+$/.test(line)) {
                let hasOptions = false;
                for (let j = i + 1; j < Math.min(i + 10, processedLines.length); j++) {
                  if (/^[a-e][\.\)]\s/i.test(processedLines[j].trim())) {
                    hasOptions = true;
                    break;
                  }
                }
                
                if (hasOptions) {
                  let questionText = line;
                  let j = i + 1;
                  
                  while (j < processedLines.length) {
                    const nextLine = processedLines[j].trim();
                    if (!nextLine) {
                      j++;
                      continue;
                    }
                    if (/^[a-e][\.\)]\s/i.test(nextLine) || /^Prompts/i.test(nextLine) || /^Possible Answers/i.test(nextLine) || /^\d+[\.\)]\s/.test(nextLine)) {
                      break;
                    }
                    questionText += ' ' + nextLine;
                    j++;
                  }
                  
                  currentQuestion = {
                    id: `${idPrefix}-${questionCounter}`,
                    text: questionText.trim(),
                    options: [],
                    correctAnswers: [],
                    feedback: '',
                    categories: [],
                    type: null,
                    number: questionCounter
                  };
                  questionCounter++;
                  inRationale = false;
                  continue;
                }
              }

              if (line.startsWith('Title:')) {
                if (currentQuestion) {
                  questions.push(currentQuestion);
                }
                
                const titleText = line.replace('Title:', '').trim();
                
                let questionText = '';
                let j = i + 1;
                while (j < processedLines.length) {
                  const nextLine = processedLines[j].trim();
                  if (!nextLine) {
                    j++;
                    continue;
                  }
                  if (/^[a-e][\.\)]\s/i.test(nextLine)) {
                    break;
                  }
                  questionText += (questionText ? ' ' : '') + nextLine;
                  j++;
                }
                
                currentQuestion = {
                  id: `${idPrefix}-${questionCounter}`,
                  text: questionText.trim(),
                  title: titleText,
                  options: [],
                  correctAnswers: [],
                  feedback: '',
                  categories: [],
                  type: null,
                  number: questionCounter
                };
                questionCounter++;
                inRationale = false;
                continue;
              }

              if (/^Question\s+\d+$/.test(line)) {
                if (currentQuestion) {
                  questions.push(currentQuestion);
                }
                
                let questionText = '';
                let j = i + 1;
                while (j < processedLines.length) {
                  const nextLine = processedLines[j].trim();
                  if (!nextLine) {
                    j++;
                    continue;
                  }
                  if (/^[a-e][\.\)]\s/i.test(nextLine)) {
                    break;
                  }
                  questionText += (questionText ? ' ' : '') + nextLine;
                  j++;
                }
                
                currentQuestion = {
                  id: `${idPrefix}-${questionCounter}`,
                  text: questionText.trim(),
                  options: [],
                  correctAnswers: [],
                  feedback: '',
                  categories: [],
                  type: null,
                  number: questionCounter
                };
                questionCounter++;
                inRationale = false;
                continue;
              }

              if (line.startsWith('Question ID:')) {
                const rationaleMatch = line.match(/Rationale:\s*([^|]+)/);
                if (rationaleMatch && currentQuestion) {
                  let feedback = rationaleMatch[1].trim();
                  const categoriesMatch = line.match(/Categories:\s*(.+)$/);
                  if (categoriesMatch) {
                    feedback += ' | Categories: ' + categoriesMatch[1].trim();
                  }
                  currentQuestion.feedback = feedback;
                }
                
                if (currentQuestion) {
                  questions.push(currentQuestion);
                  currentQuestion = null;
                }
                inRationale = false;
                continue;
              }

              if (/^\d+\.\s*$/.test(line)) {
                if (i + 1 < processedLines.length && processedLines[i + 1].trim().startsWith('Title:')) {
                  continue;
                }
                
                if (currentQuestion) {
                  questions.push(currentQuestion);
                }
                
                let questionText = '';
                let j = i + 1;
                while (j < processedLines.length && processedLines[j].trim() && !/^[a-e][\.\)]\s/i.test(processedLines[j].trim())) {
                  questionText += ' ' + processedLines[j].trim();
                  j++;
                }
                
                currentQuestion = {
                  id: `${idPrefix}-${questionCounter}`,
                  text: questionText.trim(),
                  options: [],
                  correctAnswers: [],
                  feedback: '',
                  categories: [],
                  type: null,
                  number: questionCounter
                };
                questionCounter++;
                inRationale = false;
                continue;
              }

              if (currentQuestion && /^Correct answer:/i.test(line)) {
                const answerMatch = line.match(/Correct answer:\s*([a-d])/i);
                if (answerMatch) {
                  const correctLetter = answerMatch[1].toUpperCase();
                  currentQuestion.options.forEach((opt, idx) => {
                    if (opt.letter === correctLetter) {
                      opt.correct = true;
                      if (!currentQuestion.correctAnswers.includes(idx)) {
                        currentQuestion.correctAnswers.push(idx);
                      }
                    }
                  });
                }
                continue;
              }

              if (currentQuestion && (line.startsWith('Bloom') || line.startsWith('Nursing Process:') || line.startsWith('NCLEX'))) {
                if (!currentQuestion.categories) {
                  currentQuestion.categories = [];
                }
                currentQuestion.categories.push(line);
                continue;
              }

              if (line === '~') {
                inRationale = true;
                continue;
              }

              if (line.startsWith('Rationale:')) {
                inRationale = true;
                let feedback = line.replace(/^Rationale:\s*/i, '').trim();
                if (feedback && currentQuestion) {
                  currentQuestion.feedback = feedback;
                }
                continue;
              }

              if (inRationale && currentQuestion && line && !line.startsWith('Title:')) {
                if (currentQuestion.feedback) {
                  currentQuestion.feedback += ' ' + line;
                } else {
                  currentQuestion.feedback = line;
                }
                continue;
              }

              if (currentQuestion) {
                if (/^Prompts/i.test(line) || /^Possible Answers/i.test(line)) {
                  continue;
                }
                
                const optionMatch = line.match(/^([a-eA-E])[\.\)]\s+(.+)/i);
                
                if (optionMatch) {
                  inRationale = false;
                  const letter = optionMatch[1].toUpperCase();
                  const optionText = optionMatch[2];
                  
                  const cleanText = optionText
                    .replace(/\*/g, '')
                    .replace(/[✓✔☑✅√]/g, '')
                    .replace(/\[correct\]/gi, '')
                    .replace(/\(correct\)/gi, '')
                    .replace(/\*\*/g, '')
                    .trim();
                  
                  currentQuestion.options.push({
                    text: cleanText,
                    correct: false,
                    letter: letter
                  });
                }
              }
            }

            if (currentQuestion) {
              if (currentQuestion.categories && currentQuestion.categories.length > 0) {
                if (currentQuestion.feedback) {
                  currentQuestion.feedback += ' | ' + currentQuestion.categories.join('; ');
                } else {
                  currentQuestion.feedback = currentQuestion.categories.join('; ');
                }
              }
              questions.push(currentQuestion);
            }

            return questions;
          };

          const generateCSV = () => {
            setErrors([]);
            setSuccess(false);

            if (!input.trim()) {
              setErrors(['Please provide input text or upload a file.']);
              return;
            }

            try {
              const questions = parseQuestions(input);
              
              if (questions.length === 0) {
                setErrors(['No questions detected. Please format your input with numbered questions.']);
                return;
              }

              const csvRows = [];
              const validationErrors = [];
              const skippedMatching = [];
              const skippedFillInBlank = [];

              questions.forEach((q) => {
                q.type = identifyQuestionType(q.text);
                
                if (q.type === 'MATCHING') {
                  skippedMatching.push(q.number);
                  return;
                }
                
                if (q.type === 'FILL_IN_BLANK') {
                  skippedFillInBlank.push(q.number);
                  return;
                }
                
                const baseTitle = generateTitle(q.text) || `Question ${q.number}`;
                const prefix = generateTitlePrefix();
                const title = prefix ? `${prefix} ${baseTitle}` : baseTitle;

                if ((q.type === 'MC' || q.type === 'TF') && q.correctAnswers.length === 0) {
                  validationErrors.push(`Question ${q.number}: No correct answer identified.`);
                }

                csvRows.push(['NewQuestion', q.type, '', '', '']);
                csvRows.push(['ID', q.id, '', '', '']);
                csvRows.push(['Title', title, '', '', '']);
                csvRows.push(['QuestionText', q.text || `Question ${q.number}`, '', '', '']);
                csvRows.push(['Points', '2', '', '', '']);
                csvRows.push(['Difficulty', '1', '', '', '']);

                if (q.type === 'MC') {
                  q.options.forEach((opt) => {
                    const score = opt.correct ? '100' : '0';
                    csvRows.push(['Option', score, opt.text, '', '']);
                  });
                } else if (q.type === 'MS') {
                  csvRows.push(['Scoring', 'RightAnswers', '', '', '']);
                  q.options.forEach((opt) => {
                    const score = opt.correct ? '1' : '0';
                    csvRows.push(['Option', score, opt.text, '', '']);
                  });
                } else if (q.type === 'TF') {
                  const trueOpt = q.options.find(o => o.text.toLowerCase().includes('true'));
                  const trueCorrect = trueOpt?.correct || false;
                  csvRows.push(['TRUE', trueCorrect ? '100' : '0', '', '', '']);
                  csvRows.push(['FALSE', trueCorrect ? '0' : '100', '', '', '']);
                }

                if (q.feedback) {
                  csvRows.push(['Feedback', q.feedback, '', '', '']);
                }

                csvRows.push(['', '', '', '', '']);
              });

              if (validationErrors.length > 0) {
                setErrors(validationErrors);
                return;
              }
              
              const warningMessages = [];
              if (skippedMatching.length > 0) {
                warningMessages.push(`Matching questions skipped (Question ${skippedMatching.join(', ')}). Create these manually in Brightspace.`);
              }
              if (skippedFillInBlank.length > 0) {
                warningMessages.push(`Fill-in-the-blank questions skipped (Question ${skippedFillInBlank.join(', ')}). Create these manually in Brightspace.`);
              }
              
              if (warningMessages.length > 0) {
                setErrors(warningMessages);
              }

              const csvString = csvRows.map(row => 
                row.map(cell => {
                  const str = String(cell);
                  if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                    return `"${str.replace(/"/g, '""')}"`;
                  }
                  return str;
                }).join(',')
              ).join('\n');

              setCsvOutput(csvString);
              setSuccess(true);
            } catch (error) {
              setErrors([`Error generating CSV: ${error.message}`]);
              console.error('CSV generation error:', error);
            }
          };

          const downloadCSV = () => {
            try {
              const BOM = '\uFEFF';
              const blob = new Blob([BOM + csvOutput], { type: 'text/csv;charset=utf-8;' });
              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              link.href = url;
              link.download = `brightspace-${courseCode}-${Date.now()}.csv`;
              link.style.display = 'none';
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              URL.revokeObjectURL(url);
            } catch (err) {
              setErrors([`Download error: ${err.message}`]);
            }
          };

          return (
            <div className="min-h-screen p-6" style={{ background: 'linear-gradient(to bottom right, #6c8cbe, #335b94)', fontFamily: 'Source Sans 3, sans-serif' }}>
              <div className="max-w-6xl mx-auto">
                <div className="bg-white rounded-lg shadow-xl overflow-hidden">
                  {/* Header */}
                  <div style={{ background: 'linear-gradient(to right, #1f2e4a, #335b94)' }}>
                    {/* Logo section with white background */}
                    <div className="px-8 py-6 text-center" style={{ backgroundColor: '#fefefe', margin: '0 auto', maxWidth: '600px' }}>
                      <div className="mb-4">
                        <h1 className="text-5xl font-bold" style={{ color: '#2c4a7c', fontFamily: 'Merriweather, serif', marginBottom: '0.5rem' }}>
                          GrangeRN
                        </h1>
                        <p className="text-lg" style={{ color: '#2c4a7c', fontFamily: 'Source Sans 3, sans-serif', fontWeight: 500 }}>
                          Nursing Education & Beyond
                        </p>
                      </div>
                    </div>
                    {/* Title section with navy background */}
                    <div className="px-8 py-4 text-center">
                      <h2 className="text-2xl font-bold mb-2" style={{ color: '#fefefe', fontFamily: 'Merriweather, serif' }}>
                        Brightspace Quiz CSV Converter
                      </h2>
                      <p style={{ color: '#fefefe', fontFamily: 'Source Sans 3, sans-serif' }}>
                        Transform quiz questions into Brightspace-ready CSV format
                      </p>
                    </div>
                  </div>

                  {/* Main Content */}
                  <div className="p-8">
                    {/* Instructions */}
                    <div className="mb-6 p-4 rounded" style={{ backgroundColor: '#f0f4f8', borderLeft: '4px solid #335b94' }}>
                      <h3 className="font-semibold mb-2" style={{ color: '#1f2e4a', fontFamily: 'Merriweather, serif' }}>
                        How to Use This Tool
                      </h3>
                      <div className="text-sm space-y-2" style={{ color: '#1f2e4a' }}>
                        <p><strong>Step 1:</strong> Upload a Word document (.docx) or text file, OR copy and paste your questions directly.</p>
                        <p><strong>Step 2:</strong> Your questions should include answer choices labeled with letters (A. B. C. D. or a) b) c) d.)</p>
                        <p><strong>Step 3:</strong> Click "Generate CSV" and download to upload into Brightspace.</p>
                      </div>
                    </div>

                    {/* Course Code */}
                    <div className="mb-6">
                      <label className="block text-sm font-medium mb-2" style={{ color: '#1f2e4a' }}>Course Code</label>
                      <input
                        type="text"
                        value={courseCode}
                        onChange={(e) => setCourseCode(e.target.value.toUpperCase())}
                        className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                        placeholder="e.g., NURS359AC"
                      />
                    </div>

                    {/* Assessment Type */}
                    <div className="mb-6">
                      <label className="block text-sm font-medium mb-2" style={{ color: '#1f2e4a' }}>Assessment Type & Number (Optional)</label>
                      <div className="flex gap-4">
                        <select
                          value={assessmentType}
                          onChange={(e) => setAssessmentType(e.target.value)}
                          className="px-4 py-2 border border-gray-300 rounded-lg"
                        >
                          <option value="Quiz">Quiz</option>
                          <option value="Exam">Exam</option>
                        </select>
                        <input
                          type="text"
                          value={assessmentNumber}
                          onChange={(e) => setAssessmentNumber(e.target.value)}
                          className="flex-1 px-4 py-2 border border-gray-300 rounded-lg"
                          placeholder="e.g., 2, Test Out, Sepsis"
                        />
                      </div>
                      {assessmentNumber && (
                        <p className="text-sm mt-2" style={{ color: '#6c8cbe' }}>
                          Titles will be prefixed with: <strong>{generateTitlePrefix()}</strong>
                        </p>
                      )}
                    </div>

                    {/* File Upload */}
                    <div className="mb-6">
                      <label className="block text-sm font-medium mb-2" style={{ color: '#1f2e4a' }}>Upload File</label>
                      <input
                        type="file"
                        key={fileInputKey}
                        onChange={handleFileUpload}
                        accept=".txt,.docx"
                        className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                      />
                    </div>

                    {/* Text Input */}
                    <div className="mb-6">
                      <label className="block text-sm font-medium mb-2" style={{ color: '#1f2e4a' }}>Or Paste Questions Here</label>
                      <textarea
                        value={input}
                        onChange={(e) => setInput(e.target.value)}
                        className="w-full h-64 px-4 py-2 border border-gray-300 rounded-lg font-mono text-sm"
                        placeholder="Paste your quiz questions here..."
                      />
                    </div>

                    {/* Errors */}
                    {errors.length > 0 && (
                      <div className="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded">
                        <h4 className="font-semibold text-red-800 mb-2">Issues Found:</h4>
                        <ul className="list-disc list-inside text-red-700 text-sm space-y-1">
                          {errors.map((err, i) => <li key={i}>{err}</li>)}
                        </ul>
                      </div>
                    )}

                    {/* Success */}
                    {success && (
                      <div className="mb-6 p-4 bg-green-50 border-l-4 border-green-500 rounded">
                        <span className="text-green-800 font-semibold">
                          ✓ CSV generated! {csvOutput.split('NewQuestion').length - 1} questions ready.
                        </span>
                      </div>
                    )}

                    {/* Buttons */}
                    <div className="flex gap-4 mb-6">
                      <button
                        onClick={generateCSV}
                        className="flex-1 text-white py-3 px-6 rounded-lg font-semibold transition-all hover:opacity-90"
                        style={{ backgroundColor: '#335b94', fontFamily: 'Source Sans 3, sans-serif' }}
                      >
                        Generate CSV
                      </button>
                      {csvOutput && (
                        <button
                          onClick={downloadCSV}
                          className="text-white py-3 px-6 rounded-lg font-semibold transition-all hover:opacity-90"
                          style={{ backgroundColor: '#6c8cbe', fontFamily: 'Source Sans 3, sans-serif' }}
                        >
                          📥 Download CSV
                        </button>
                      )}
                    </div>

                    {/* Preview */}
                    {csvOutput && (
                      <div className="mb-6">
                        <h4 className="text-lg font-semibold mb-2" style={{ color: '#1f2e4a', fontFamily: 'Merriweather, serif' }}>
                          Preview (first 25 lines):
                        </h4>
                        <pre className="bg-gray-50 p-4 rounded-lg overflow-x-auto text-xs border border-gray-200" style={{ maxHeight: '300px' }}>
                          {csvOutput.split('\n').slice(0, 25).join('\n')}
                          {csvOutput.split('\n').length > 25 && '\n...'}
                        </pre>
                      </div>
                    )}

                    {/* Start Over */}
                    <button
                      onClick={handleStartOver}
                      className="w-full text-white py-3 px-6 rounded-lg font-semibold transition-all hover:opacity-90"
                      style={{ backgroundColor: '#6c8cbe', fontFamily: 'Source Sans 3, sans-serif' }}
                    >
                      Start Over / Clear All
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BrightspaceConverter />);
    </script>
</body>
</html>
